name: jarktracker
description: "Jark Tracker - GPS tracking client app"
publish_to: 'none'
version: 1.1.5+24

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Networking
  dio: ^5.7.0

  # State management
  flutter_riverpod: ^2.5.1

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Maps (OpenStreetMap - no API key needed)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Utilities
  intl: ^0.19.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1

  # Firebase (FCM) — removed in 1.1.1+20 to fix crash on launch.
  # Restore once google-services.json is added and Firebase.initializeApp() is called in main.dart.
  # firebase_core: ^3.6.0
  # firebase_messaging: ^15.1.3

  # Image picker for avatar upload
  image_picker: ^1.1.2

  # Native share sheet (Android Share intent / Web share API)
  share_plus: ^10.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
